<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Yönetim Paneli | canwebco</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" href="assets/favicon-64.png" type="image/png">
<link rel="stylesheet" href="style.css">
<script>
  (function () {
    var saved = localStorage.getItem("theme");
    document.documentElement.setAttribute("data-theme", saved || "light");
  })();
</script>
<style>
  .admin-wrap { max-width: 760px; margin: 0 auto; padding: 140px 24px 100px; }
  .admin-gate-wrap { max-width: 360px; margin: 160px auto 100px; padding: 0 24px; }
  .admin-card { background: var(--bg-soft); border: 1px solid var(--border); border-radius: 18px; padding: 26px; }
  .admin-field { display: flex; flex-direction: column; gap: 8px; margin-bottom: 16px; }
  .admin-field input { padding: 12px 14px; border-radius: 10px; border: 1px solid var(--border); background: var(--bg); color: var(--text); font-size: 15px; }
  .admin-btn { display: inline-block; padding: 12px 20px; border-radius: 999px; background: var(--accent); color: #fff; border: none; font-weight: 600; font-size: 15px; cursor: pointer; width: 100%; }
  .msg-row { border: 1px solid var(--border); border-radius: 14px; padding: 18px 20px; margin-bottom: 12px; background: var(--bg-soft); }
  .msg-row.replied { opacity: .55; }
  .msg-head { display: flex; justify-content: space-between; align-items: baseline; gap: 10px; flex-wrap: wrap; }
  .msg-head b { font-size: 16px; }
  .msg-date { font-size: 12px; color: var(--text-soft); }
  .msg-email { font-size: 13px; color: var(--text-soft); margin: 2px 0 10px; }
  .msg-body { font-size: 14.5px; line-height: 1.5; white-space: pre-wrap; }
  .msg-actions { display: flex; gap: 8px; margin-top: 12px; }
  .msg-actions button { border: none; border-radius: 8px; padding: 7px 12px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-reply { background: var(--accent); color: #fff; }
  .btn-toggle { background: var(--border); color: var(--text); }
  .btn-del { background: #d1242f; color: #fff; }
  .admin-topbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 24px; }
  .admin-empty { color: var(--text-soft); text-align: center; padding: 40px 0; }
  #adminMsg { padding: 10px 14px; border-radius: 10px; font-size: 14px; font-weight: 600; margin-bottom: 16px; display: none; }
  #adminMsg.ok { background: rgba(0,113,227,.12); color: var(--accent); display: block; }
  #adminMsg.err { background: rgba(209,36,47,.12); color: #d1242f; display: block; }
</style>
</head>
<body>

<header class="nav" id="nav">
  <div class="nav-inner">
    <a href="index.html" class="logo">
      <img src="assets/logo-512.png" alt="canwebco logosu" class="logo-icon" id="logoIcon">
      <span class="logo-word">can<span class="logo-dim">webco</span></span>
    </a>
    <span style="font-weight:600;color:var(--text-soft);font-size:14px;">Yönetim Paneli</span>
    <div class="nav-actions">
      <button class="theme-toggle" id="themeToggle" role="switch" aria-checked="false" aria-label="Karanlık modu aç/kapat">
        <span class="theme-toggle-track"><span class="theme-toggle-thumb"></span></span>
      </button>
    </div>
  </div>
</header>

<main>
  <section id="adminGate" class="admin-gate-wrap">
    <div class="admin-card">
      <h2 style="margin-bottom:16px;">Yönetim Girişi</h2>
      <div class="admin-field">
        <label for="adminPass">Admin Şifresi</label>
        <input type="password" id="adminPass">
      </div>
      <button class="admin-btn" id="adminEnterBtn">Giriş Yap</button>
    </div>
  </section>

  <section id="adminPanel" class="admin-wrap" style="display:none;">
    <div id="adminMsg"></div>
    <div class="admin-topbar">
      <h2 style="margin:0;">Gelen Mesajlar</h2>
      <span id="msgCount" style="font-size:14px;color:var(--text-soft);"></span>
    </div>
    <div id="msgList"></div>
  </section>
</main>

<script src="admin.js"></script>
</body>
</html>
